name: Build

on:
  push:
    branches: [main, feat/*]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.0'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Frontend
        run: |
          npm install
          npm run build
        working-directory: ./frontend

      - name: Build Windows Binary
        run: $env:GOOS = "windows"; $env:GOARCH = "amd64"; wails build -platform windows -arch amd64

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StarCore-windows
          path: build/bin/StarCore.exe
